<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Builder</title>
</head>

<body>
    <h2>FAQ Builder</h2>
    <form id="faqForm">
        <label>Question:
            <input type="text" id="question">
        </label>
        <br><br>
        <label>Answer:
            <textarea id="answer"></textarea>
        </label>
        <br><br>
        <button type="submit">Add FAQ</button>
    </form>
    <p id="message"></p>
    <hr>
    <div id="faqContainer">
        <p id="emptyMsg">No FAQs available</p>
    </div>
    <script src="./JS Validation Form-Assig1.js"></script>
</body>

</html>
