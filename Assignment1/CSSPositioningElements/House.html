<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House</title>

    <style>
        .box {
            position: relative;
            left: 250px;
            width: 600px;
            height: 40px;
            background-color: orange;
            border: 1px solid black;
            color: rgb(246, 152, 11);
            border: 4px solid black;
        }
         .box1 {
            position: relative;
            left: 30%;
            width: 350px;
            height: 400px;
            background-color: greenyellow;
            border: 4px solid black;
            text-align: center;
            color: rgb(246, 152, 11);
            border: 4px solid black;

         }
            .box2 {
                position: absolute;
                top: 70px;
                left: 50px;
                width: 50px;
                height: 85px;
                background-color: yellow;
                border: 1px solid black;
                border: 5px solid black;
                
            }
            .box3 {
                position: absolute;
                top: 100px;
                right: 50px;
                width: 50px;
                height: 60px;
                background-color: purple;
                border: 1px solid black;
                border: 5px solid black;

            }
            .box4 {
                position: absolute;
                bottom: 0%;
                left: 135px;
                width: 80px;
                height: 175px;
                background-color: blue;
                border: 1px solid black;
                border: 5px solid black;

            }

    </style>
</head>
<body>

    <h1>House</h1>
    <div class="box"></div>
    <div class="box1">
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
    </div>
</body>
</html>
