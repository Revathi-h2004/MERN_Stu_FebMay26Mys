<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notification Center</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 p-10 flex justify-center">

  <!-- Card -->
  <div class="bg-white p-6 rounded-lg shadow w-full max-w-md">

    <!-- Header -->
    <div class="flex justify-between items-center mb-5">
      <h2 class="text-xl font-bold tracking-wide">
        Notification Center
      </h2>

      <span class="inline-flex items-center bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-semibold">
        3 New
      </span>
    </div>

    <!-- Alert 1 -->
    <div class="bg-red-100 border-l-4 border-red-500 p-4 rounded mb-4">
      <h3 class="font-bold mb-1">Action Required</h3>
      <p class="leading-relaxed text-sm">
        Your last payment attempt failed. Please update your payment method to avoid service interruption.
      </p>
    </div>

    <!-- Alert 2 -->
    <div class="bg-yellow-100 border-l-4 border-yellow-500 p-4 rounded mb-6">
      <h3 class="font-bold mb-1">Maintenance Notice</h3>
      <p class="leading-relaxed text-sm">
        The system will undergo maintenance tonight. Some features may be temporarily unavailable.
      </p>
    </div>

    <!-- Footer -->
    <div class="flex space-x-4">

      <!-- Primary -->
      <button class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-lg shadow">
        View All
      </button>

      <!-- Secondary -->
      <button class="border border-gray-300 text-gray-700 px-6 py-3 rounded-lg hover:bg-gray-100">
        Dismiss
      </button>

    </div>

  </div>

</body>
</html>
